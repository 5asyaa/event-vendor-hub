<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - EventVendorHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Outfit','sans-serif']},colors:{brand:{orange:'#F27024',darkBlue:'#0F172A'}}}}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F9FAFB] font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="../public/index.html" class="flex items-center gap-2 group">
                <div class="bg-brand-orange p-2 rounded-xl text-white group-hover:scale-105 transition-transform">
                    <i class="fa-regular fa-calendar-days text-xl text-white"></i>
                </div>
                <span class="text-xl font-bold text-brand-darkBlue">EventVendor<span class="text-brand-orange">Hub</span></span>
            </a>
            <nav class="hidden md:flex items-center space-x-8">
                <a href="pencarian-vendor.html" class="text-sm font-semibold text-slate-500 hover:text-brand-darkBlue transition-colors py-2">Temukan Vendor</a>
                <a href="pesanan-saya.html" class="text-sm font-semibold text-slate-500 hover:text-brand-darkBlue transition-colors py-2">Pesanan Saya</a>
            </nav>
            <div class="flex items-center space-x-4">
                <a href="profil.html" class="text-sm font-semibold text-brand-orange transition flex items-center gap-1.5">
                    <i class="fa-regular fa-user mr-1" style="color:#F27024"></i> <span id="header-username">Profil</span>
                </a>
                <button id="logout-btn" class="text-sm font-semibold text-red-500 hover:text-red-700 transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto w-full px-4 py-10 space-y-6">

        <h1 class="text-2xl font-bold text-brand-darkBlue">Profil Saya</h1>

        <!-- Avatar & info singkat -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex items-center gap-5">
            <div id="avatar-circle" class="w-16 h-16 rounded-full bg-orange-500 text-white font-black text-2xl flex items-center justify-center flex-shrink-0">?</div>
            <div>
                <h2 id="display-name" class="text-xl font-bold text-slate-900">Memuat...</h2>
                <p id="display-role" class="text-xs font-semibold text-orange-500 uppercase mt-0.5">—</p>
                <p id="display-email" class="text-xs text-gray-400 mt-1">—</p>
            </div>
        </div>

        <!-- Form edit profil -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-5">
            <h3 class="font-bold text-slate-900">Informasi Akun</h3>

            <!-- Error / Success banner -->
            <div id="msg-banner" class="hidden items-center gap-2 rounded-xl px-4 py-3 text-xs font-semibold"></div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Nama Lengkap</label>
                <input id="field-nama" type="text" placeholder="Nama lengkap"
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Email</label>
                <input id="field-email" type="email" disabled
                    class="w-full bg-gray-100 border border-gray-200 rounded-xl py-2.5 px-3 text-sm text-gray-400 cursor-not-allowed">

            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Nomor HP</label>
                <input id="field-hp" type="text" placeholder="+62 812..."
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Role</label>
                <input id="field-role" type="text" disabled
                    class="w-full bg-gray-100 border border-gray-200 rounded-xl py-2.5 px-3 text-sm text-gray-400 cursor-not-allowed capitalize">
            </div>
        </div>

        <!-- Ganti Password -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-4">
            <h3 class="font-bold text-slate-900">Ganti Password</h3>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Password Baru</label>
                <input id="field-newpass" type="password" placeholder="Minimal 6 karakter"
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Konfirmasi Password Baru</label>
                <input id="field-confirmpass" type="password" placeholder="Ulangi password baru"
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
        </div>

        <div class="flex gap-3">
            <button id="save-btn" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-sm transition shadow-sm">
                Simpan Perubahan
            </button>
            <a href="pesanan-saya.html" class="px-6 py-3 border border-slate-200 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-50 transition text-center">
                Kembali
            </a>
        </div>

    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
        <div id="toast-inner" class="flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-semibold text-white">
            <i id="toast-icon"></i><span id="toast-text"></span>
        </div>
    </div>

    <script>
    const API = window.location.origin;

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        document.getElementById('toast-inner').style.background = type === 'success' ? '#16a34a' : '#dc2626';
        document.getElementById('toast-icon').className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
        document.getElementById('toast-text').textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 3000);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const session = JSON.parse(localStorage.getItem('session') || '{}');
        if (!session.isLoggedIn) { window.location.href = '../public/login.html'; return; }

        const token = session.token || '';

        // Tampilkan nama di header
        const headerUsername = document.getElementById('header-username');
        if (headerUsername && session.nama) {
            headerUsername.textContent = 'Hai, ' + session.nama.split(' ')[0];
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('session');
            window.location.href = '../public/login.html';
        });

        // Fetch data user dari backend
        try {
            const res = await fetch(`${API}/auth/users/${session.id}`);
            if (!res.ok) throw new Error();
            const user = await res.json();

            // Tampilkan data
            const initials = (user.nama || 'U').substring(0, 2).toUpperCase();
            document.getElementById('avatar-circle').textContent   = initials;
            document.getElementById('display-name').textContent    = user.nama  || '—';
            document.getElementById('display-email').textContent   = user.email || '—';
            document.getElementById('display-role').textContent    = user.role  || '—';
            document.getElementById('field-nama').value  = user.nama  || '';
            document.getElementById('field-email').value = user.email || '';
            document.getElementById('field-hp').value    = user.no_hp || '';
            document.getElementById('field-role').value  = user.role  || '';
        } catch(e) {
            showToast('Gagal memuat data profil.', 'error');
        }

        // Simpan perubahan ke database via API
        document.getElementById('save-btn').addEventListener('click', async function() {
            const newpass   = document.getElementById('field-newpass').value;
            const confpass  = document.getElementById('field-confirmpass').value;

            if (newpass && newpass !== confpass) {
                showToast('Password baru tidak cocok!', 'error');
                return;
            }
            if (newpass && newpass.length < 6) {
                showToast('Password minimal 6 karakter!', 'error');
                return;
            }

            this.disabled = true;
            this.textContent = 'Menyimpan...';

            const nama  = document.getElementById('field-nama').value.trim();
            const no_hp = document.getElementById('field-hp').value.trim();

            const body = { nama, no_hp };
            if (newpass) body.password = newpass;

            const token = session.token || '';

            try {
                const res = await fetch(`${API}/auth/users/${session.id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.message || 'Gagal menyimpan perubahan');
                }

                // Refresh data dari backend
                const updated = await fetch(`${API}/auth/users/${session.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => r.ok ? r.json() : null);
                if (!updated) throw new Error('Gagal refresh data');

                document.getElementById('display-name').textContent  = updated.nama  || nama;
                document.getElementById('display-email').textContent = updated.email || '';
                document.getElementById('field-nama').value  = updated.nama  || '';
                document.getElementById('field-email').value = updated.email || '';
                document.getElementById('field-hp').value    = updated.no_hp || '';
                document.getElementById('avatar-circle').textContent = (updated.nama || nama).substring(0, 2).toUpperCase();

                // Update session lokal
                const updatedSession = { ...session, nama: updated.nama || nama };
                localStorage.setItem('session', JSON.stringify(updatedSession));

                // Reset field password
                document.getElementById('field-newpass').value    = '';
                document.getElementById('field-confirmpass').value = '';

                showToast('Profil berhasil diperbarui!', 'success');
            } catch(e) {
                showToast(e.message || 'Gagal menyimpan perubahan.', 'error');
            } finally {
                this.disabled = false;
                this.textContent = 'Simpan Perubahan';
            }
        });
    });
    </script>

    <footer class="bg-[#0B1221] text-white py-12 px-6 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="space-y-2 text-center md:text-left">
                <a href="../public/index.html" class="flex items-center justify-center md:justify-start space-x-2">
                    <div class="bg-brand-orange p-1.5 rounded-lg text-white">
                        <i class="fa-regular fa-calendar-days text-sm text-white"></i>
                    </div>
                    <span class="text-lg font-bold tracking-tight text-white">EventVendor<span class="text-brand-orange">Hub</span></span>
                </a>
                <p class="text-sm text-slate-400">© 2024 EventVendorHub. Indonesian Hospitality, Global Standards.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-6 text-sm font-medium text-slate-300">
                <a href="#" class="hover:text-brand-orange transition-colors">About Us</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Terms of Service</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Privacy Policy</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Contact Support</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Vendor FAQ</a>
            </div>
        </div>
    </footer>
</body>
</html>
