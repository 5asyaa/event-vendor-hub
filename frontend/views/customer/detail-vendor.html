<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Vendor - EventVendorHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#F27024',
                            darkBlue: '#0F172A',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-slate-900 font-sans min-h-screen flex flex-col">
    <!-- NAVBAR STANDAR -->
    <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="../public/index.html" class="flex items-center gap-2 group">
                <div class="bg-[#F27024] p-2 rounded-xl text-white group-hover:scale-105 transition-transform">
                    <i class="fa-regular fa-calendar-days text-lg text-white"></i>
                </div>
                <span class="text-lg font-bold text-[#0F172A]">EventVendor<span class="text-[#F27024]">Hub</span></span>
            </a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-slate-500">
                <a href="pencarian-vendor.html" class="hover:text-[#0F172A] transition">Temukan Vendor</a>
                <a href="pesanan-saya.html" class="hover:text-[#0F172A] transition">Pesanan Saya</a>
            </nav>
            <div id="auth-container" class="flex items-center gap-3">
                <a href="../public/login.html" class="text-sm font-semibold text-[#0F172A] px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition">Login</a>
                <a href="../public/register.html" class="text-sm font-semibold text-white bg-[#0F172A] px-4 py-2 rounded-lg hover:bg-slate-800 shadow-sm transition">Register</a>
            </div>
        </div>
    </header>
    
    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 overflow-hidden rounded-2xl bg-gray-100"><img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover"></div>
            <div class="grid grid-rows-2 gap-4">
                <div class="overflow-hidden rounded-2xl bg-gray-100"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
                <div class="overflow-hidden rounded-2xl bg-gray-100"><img src="https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Photography</span>
                <h1
                    id="vendor-name"
                    class="text-3xl font-extrabold text-slate-900 mt-1">
                </h1>
                <p
                    id="vendor-meta"
                    class="text-xs text-gray-500 mt-1">
                </p>
            </div>
            <button id="wa-btn" class="bg-[#25d366] text-white text-sm font-semibold px-5 py-3 rounded-xl flex items-center gap-2 shadow-sm opacity-50 cursor-not-allowed" disabled><i class="fa-brands fa-whatsapp text-lg"></i> Tanya via WhatsApp</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 space-y-3">
                    <h3 class="font-bold text-lg text-slate-900">Tentang Vendor</h3>
                    <p
                        id="vendor-description"
                        class="text-sm text-gray-500 leading-relaxed">
                    </p>
                </div>
                <div id="package-list" class="space-y-4">
                </div>

            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-md space-y-4">
                <span class="text-xs text-gray-400 block font-bold uppercase tracking-wider">Mulai Dari</span>
                <span class="text-2xl font-black text-slate-900 block" id="price-display">Rp 8.500.000</span>
                <form class="space-y-3" id="booking-form" onsubmit="event.preventDefault(); handleBooking();">
                    <select id="package-select" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 text-xs font-medium focus:ring-1 focus:ring-brand-orange focus:border-brand-orange outline-none">
                    </select>
                    <button type="submit" class="w-full bg-brand-darkBlue hover:bg-slate-800 text-white font-semibold py-3.5 rounded-xl text-sm transition shadow-md">Booking Sekarang</button>
                </form>
            </div>
        </div>
    </main>

    <!-- MVC: Logic inline -->
    <script>
    const API = window.location.origin;

    document.addEventListener('DOMContentLoaded', function() {
        // Auth UI
        const authContainer = document.getElementById('auth-container');
        let session = null;
        try { session = JSON.parse(localStorage.getItem('session')); } catch(e) {}

        if (session && session.nama) {
            authContainer.innerHTML = `
                <a href="profil.html" class="text-sm font-semibold text-slate-700 hover:text-brand-orange transition flex items-center gap-2">
                    <i class="fa-regular fa-circle-user text-xl"></i>
                    <span>Hai, ${session.nama.split(' ')[0]}</span>
                </a>
                <button onclick="logout()" class="text-sm font-semibold text-red-500 hover:text-red-700 transition flex items-center gap-1">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>`;
        } else {
            authContainer.querySelector('a[href="../login.html"]').href = '../public/login.html';
        }

        const vendorId     = new URLSearchParams(window.location.search).get("id");
        const packageSelect= document.getElementById('package-select');
        const priceDisplay = document.getElementById('price-display');
        const packageList  = document.getElementById('package-list');

        if (!vendorId) {
            document.getElementById('vendor-name').textContent = 'Vendor tidak ditemukan';
            return;
        }

        // Ambil data vendor by ID
        fetch(`${API}/vendors/${vendorId}`)
            .then(r => r.json())
            .then(vendor => {
                if (!vendor || !vendor.nama_usaha) return;
                document.getElementById('vendor-name').textContent = vendor.nama_usaha;
                document.getElementById('vendor-meta').innerHTML =
                    `<i class="fa-solid fa-star text-amber-400"></i> ${vendor.rating_avg || '0.0'} • ${vendor.alamat || ''}`;
                document.getElementById('vendor-description').textContent = vendor.deskripsi || '';

                // Update WhatsApp button
                const waBtn = document.getElementById('wa-btn');
                if (waBtn) {
                    const rawWa = vendor.link_whatsapp || '';
                    const waNumber = rawWa.replace(/\D/g, ''); // hapus semua non-digit
                    if (waNumber) {
                        waBtn.disabled = false;
                        waBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        waBtn.classList.add('hover:bg-[#1ebe57]', 'transition');
                        waBtn.onclick = () => window.open(`https://wa.me/${waNumber}`, '_blank');
                    }
                }
            });

        // Ambil layanan/paket vendor
        fetch(`${API}/services`)
            .then(r => r.json())
            .then(allServices => {
                const services = allServices.filter(s => Number(s.id_vendor) === Number(vendorId));
                packageList.innerHTML  = '';
                packageSelect.innerHTML= '';

                if (services.length === 0) {
                    packageList.innerHTML = `<p class="text-xs text-gray-400">Belum ada paket layanan tersedia.</p>`;
                    return;
                }

                services.forEach(service => {
                    packageSelect.innerHTML += `<option value="${service.harga}" data-id="${service.id_service}">${service.nama_paket}</option>`;

                    const fiturHtml = service.fitur
                        ? service.fitur.split(',').map(f => `<div>✓ ${f.trim()}</div>`).join('')
                        : '';

                    packageList.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl border border-gray-200">
                            <div class="flex justify-between items-start">
                                <div>
                                    ${service.level_paket ? `<span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-full">${service.level_paket}</span>` : ''}
                                    <h4 class="font-bold text-lg text-slate-900 mt-3">${service.nama_paket}</h4>
                                    <p class="text-gray-500 text-sm mt-2">${service.deskripsi_layanan || ''}</p>
                                </div>
                                <span class="text-xl font-extrabold text-slate-900 flex-shrink-0 ml-4">Rp ${Number(service.harga).toLocaleString("id-ID")}</span>
                            </div>
                            ${fiturHtml ? `<div class="mt-4 space-y-1 text-sm text-gray-600">${fiturHtml}</div>` : ''}
                        </div>`;
                });

                // Set harga awal
                if (services.length > 0) {
                    priceDisplay.textContent = new Intl.NumberFormat('id-ID', {
                        style: 'currency', currency: 'IDR', minimumFractionDigits: 0
                    }).format(services[0].harga);
                }
            });

        // Update harga saat paket berubah
        packageSelect.addEventListener('change', function() {
            priceDisplay.textContent = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(Number(this.value));
        });
    });

    function logout() {
        localStorage.removeItem('session');
        window.location.reload();
    }

    function handleBooking() {
        const packageSelect = document.getElementById('package-select');
        const vendorId      = new URLSearchParams(window.location.search).get("id");
        let session = null;
        try { session = JSON.parse(localStorage.getItem('session')); } catch(e) {}

        if (!session || !session.isLoggedIn) {
            window.location.href = '../public/login.html';
            return;
        }

        const selectedOption = packageSelect.options[packageSelect.selectedIndex];
        localStorage.setItem("activeCheckout", JSON.stringify({
            id_vendor:   vendorId,
            id_service:  selectedOption.dataset.id,
            nama_vendor: document.getElementById("vendor-name").textContent,
            nama_paket:  selectedOption.text,
            harga:       Number(selectedOption.value)
        }));
        window.location.href = "alur-pemesanan.html";
    }
    </script>

    <footer class="bg-[#0B1221] text-white py-12 px-6 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="space-y-2 text-center md:text-left">
                <a href="../public/index.html" class="flex items-center justify-center md:justify-start space-x-2">
                    <div class="bg-brand-orange p-1.5 rounded-lg text-white">
                        <i class="fa-regular fa-calendar-days text-sm text-white"></i>
                    </div>
                    <span class="text-lg font-bold tracking-tight text-white">EventVendor<span class="text-brand-orange">Hub</span></span>
                </a>
                <p class="text-sm text-slate-400">© 2024 EventVendorHub. Indonesian Hospitality, Global Standards.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-6 text-sm font-medium text-slate-300">
                <a href="#" class="hover:text-brand-orange transition-colors">About Us</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Terms of Service</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Privacy Policy</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Contact Support</a>
                <a href="#" class="hover:text-brand-orange transition-colors">Vendor FAQ</a>
            </div>
        </div>
    </footer>
</body>
</html>
